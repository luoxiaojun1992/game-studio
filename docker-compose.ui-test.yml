services:
  codebuddy-sdk-mock:
    image: node:20
    working_dir: /workspace
    command: ["node", "tests/mock-server/codebuddy-sdk-mock-server.mjs"]
    environment:
      - MOCK_SERVER_PORT=3001
      - MOCK_SERVER_HOST=0.0.0.0
    volumes:
      - ./:/workspace
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  studio-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: builder
    working_dir: /app
    command: ["npm", "run", "server"]
    environment:
      - PORT=3000
      - CODEBUDDY_API_KEY=mock-codebuddy-key
      - CODEBUDDY_BASE_URL=http://codebuddy-sdk-mock:3001
      - STAR_OFFICE_UI_URL=http://starofficeui:19000
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_USE_SSL=false
      - MINIO_BUCKET=game-files
      - CREATOR_SERVICE_URL=http://creator:8080
      - SCANNER_SERVICE_URL=http://scanner:8081
      - SONARQUBE_HOST=http://sonarqube:9000
      - SONARQUBE_USER=admin
      - SONARQUBE_PASSWORD=admin
    depends_on:
      codebuddy-sdk-mock:
        condition: service_healthy
      star-office-ui:
        condition: service_healthy
      minio:
        condition: service_healthy
      sonarqube:
        condition: service_healthy
      creator:
        condition: service_started
      scanner:
        condition: service_started
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  star-office-ui:
    build:
      context: ./star-office-ui
      dockerfile: Dockerfile
    environment:
      - STAR_BACKEND_PORT=19000
      - STAR_OFFICE_MAX_CONCURRENT=100
    networks:
      default:
        aliases:
          - starofficeui
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  creator:
    build:
      context: ./creator
      dockerfile: Dockerfile
    environment:
      - CREATOR_PORT=8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  scanner:
    build:
      context: ./sonar-scanner-service
      dockerfile: Dockerfile
    environment:
      - SCANNER_PORT=8081
      - SONAR_HOST_URL=http://sonarqube:9000
    ports:
      - "8081:8081"
    volumes:
      - scanner-data:/app/scanner
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  sonarqube:
    image: sonarqube:community
    ports:
      - "9002:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status 2>/dev/null | grep -q '\"status\":\"UP\"' && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  ui-app:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: http://studio-backend:3000
        VITE_STAR_OFFICE_UI_URL: http://star-office-ui:19000
    depends_on:
      studio-backend:
        condition: service_healthy
      star-office-ui:
        condition: service_healthy
    ports:
      - "4173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ui-e2e:
    build:
      context: tests/ui
      dockerfile: Dockerfile.e2e
    working_dir: /workspace
    user: "${UID:-1000}:${GID:-1000}"
    command: ["sh", "-c", "npm run test:ui:ci"]
    environment:
      - UI_BASE_URL=http://ui-app
      - STUDIO_API_BASE=http://studio-backend:3000
      - STAR_OFFICE_API_BASE=http://star-office-ui:19000
      - CODEBUDDY_MOCK_ADMIN_URL=http://codebuddy-sdk-mock:3001
      - UI_COVERAGE_THRESHOLD=90
      - UI_TEST_LOOP_TIMEOUT_MS=600000
      - ALLURE_RESULTS_DIR=artifacts/allure-results
      - HOME=/tmp
      - NPM_CONFIG_CACHE=/tmp/.npm
    volumes:
      - ./tests/ui/artifacts:/workspace/artifacts
      - ./tests/ui/coverage:/workspace/coverage
    depends_on:
      ui-app:
        condition: service_healthy
      studio-backend:
        condition: service_healthy
      codebuddy-sdk-mock:
        condition: service_healthy
      star-office-ui:
        condition: service_healthy
      creator:
        condition: service_healthy

volumes:
  scanner-data:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions:
