services:
  ui-mock-server:
    image: node:20
    working_dir: /workspace
    command: ["node", "tests/mock-server/tencent-ai-mock-server.mjs"]
    environment:
      - MOCK_SERVER_PORT=3001
    volumes:
      - ./:/workspace
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  ui-app:
    image: node:20
    working_dir: /workspace
    command: ["sh", "-c", "npm ci && npm run dev:client -- --host 0.0.0.0 --port 4173"]
    environment:
      - VITE_API_BASE=http://ui-mock-server:3001
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
    volumes:
      - ./:/workspace
      - /workspace/node_modules
    depends_on:
      ui-mock-server:
        condition: service_healthy
    ports:
      - "4173:4173"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ui-e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    working_dir: /workspace
    command: ["sh", "-c", "npm ci --ignore-scripts && npm run test:ui:ci"]
    environment:
      - CI=true
      - UI_BASE_URL=http://ui-app:4173
      - MOCK_SERVER_ADMIN_URL=http://ui-mock-server:3001
      - UI_COVERAGE_THRESHOLD=90
    volumes:
      - ./:/workspace
      - /workspace/node_modules
    depends_on:
      ui-app:
        condition: service_healthy
      ui-mock-server:
        condition: service_healthy
