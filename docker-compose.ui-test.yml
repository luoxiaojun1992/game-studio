version: '3.8'

services:
  ui-mock-server:
    image: node:20-alpine
    working_dir: /workspace
    command: ["node", "tests/mock-server/tencent-ai-mock-server.mjs"]
    environment:
      - MOCK_SERVER_PORT=3001
    volumes:
      - ./:/workspace
    ports:
      - "3001:3001"

  ui-app:
    image: node:20-alpine
    working_dir: /workspace
    command: ["sh", "-c", "npm ci && npm run dev:client -- --host 0.0.0.0 --port 4173"]
    environment:
      - VITE_API_BASE=http://ui-mock-server:3001
    volumes:
      - ./:/workspace
    depends_on:
      - ui-mock-server
    ports:
      - "4173:4173"

  ui-e2e:
    image: mcr.microsoft.com/playwright:v1.54.2-jammy
    working_dir: /workspace
    command: ["sh", "-c", "npm ci && until curl -sf http://ui-app:4173 >/dev/null; do echo 'waiting for ui-app...'; sleep 2; done && npm run test:ui:ci"]
    environment:
      - CI=true
      - UI_BASE_URL=http://ui-app:4173
      - MOCK_SERVER_ADMIN_URL=http://ui-mock-server:3001
      - UI_COVERAGE_THRESHOLD=90
    volumes:
      - ./:/workspace
    depends_on:
      - ui-app
      - ui-mock-server
