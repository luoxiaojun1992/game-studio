version: '3.8'

# SonarQube CI 环境专用 compose
# 用途：GitHub Actions 中启动 SonarQube + Scanner 进行代码扫描
# 特点：不含业务服务；restart: no（容器执行完即销毁）

services:
  sonarqube:
    image: sonarqube:10.6-community
    container_name: game-studio-sonarqube
    ports:
      - "9000:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    networks:
      - sonar-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9000/api/system/status 2>/dev/null | grep -q '\"status\":\"UP\"' && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    restart: "no"

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: game-studio-sonar-scanner
    volumes:
      - .:/usr/src
    working_dir: /usr/src
    environment:
      - SONAR_TOKEN=sonarpass
    command: >
      -Dsonar.projectKey=game-studio
      -Dsonar.sources=server,src,star-office-ui/server
      -Dsonar.sourceEncoding=UTF-8
      -Dsonar.host.url=http://sonarqube:9000
      -Dsonar.token=sonarpass
    networks:
      - sonar-network
    depends_on:
      sonarqube:
        condition: service_healthy
    restart: "no"

volumes:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions:

networks:
  sonar-network:
    driver: bridge
