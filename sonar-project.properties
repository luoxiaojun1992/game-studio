sonar.projectKey=game-studio
sonar.projectName=Game Dev Studio
sonar.sources=server,src
sonar.sourceEncoding=UTF-8
sonar.host.url=http://sonarqube:9000
sonar.token=${SONAR_TOKEN}
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/Dockerfile*,**/.dockerignore
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.jacoco.xmlReportsPaths=coverage/jacoco.xml
sonar.json.jsonFilePaths=coverage/sonar-report.json
sonar.scanner.appVersion=10.6
