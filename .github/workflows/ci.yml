name: ui-test-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run UI tests in docker compose
        run: docker compose -f docker-compose.ui-test.yml up --build --abort-on-container-exit --exit-code-from ui-e2e

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: |
            tests/ui/artifacts/allure-report
            tests/ui/artifacts/allure-results
            artifacts/allure-results
            tests/ui/artifacts/test-results
            tests/ui/artifacts/ui-coverage-summary.json
          if-no-files-found: warn

      - name: Teardown docker compose
        if: always()
        run: docker compose -f docker-compose.ui-test.yml down -v
