name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  sonar-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SonarQube Scanner
        run: docker compose -f docker-compose-sonar-check.yml up -d sonar-scanner

      - name: Wait for Scanner to finish
        run: docker compose -f docker-compose-sonar-check.yml wait sonar-scanner; echo "scanner_exit=$?"

      - name: Check HIGH/CRITICAL Issues
        run: |
          CRIT_COUNT=$(python3 -c "
import json, sys
try:
    with open('.scannerwork/sonar-report.json') as f:
        data = json.load(f)
    count = sum(1 for i in data.get('issues', []) if i.get('severity') in ('CRITICAL', 'HIGH'))
    print(count)
except:
    print(0)
")
          echo "HIGH/CRITICAL issues: $CRIT_COUNT"
          if [ "$CRIT_COUNT" -gt 0 ]; then
            echo "Blocking UI tests due to HIGH/CRITICAL issues"
            exit 1
          fi

      - name: Upload SonarQube Report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: |
            .scannerwork/sonar-report.json
            .scannerwork/sonar-task.txt
          if-no-files-found: warn

      - name: Teardown SonarQube
        if: always()
        run: docker compose -f docker-compose-sonar-check.yml down -v

  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    needs: [sonar-check]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run UI tests in docker compose
        run: |
          mkdir -p tests/ui/artifacts
          env UID="$(id -u)" GID="$(id -g)" docker compose -f docker-compose.ui-test.yml up --build --abort-on-container-exit --exit-code-from ui-e2e

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: |
            tests/ui/artifacts/allure-report
            tests/ui/artifacts/allure-results
            artifacts/allure-results
            tests/ui/artifacts/test-results
            tests/ui/artifacts/ui-coverage-summary.json
            tests/ui/artifacts/playwright-report/results.json
          if-no-files-found: warn

      - name: Teardown docker compose
        if: always()
        run: |
          docker compose -f docker-compose.ui-test.yml down -v
