server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    # Docker embedded DNS (127.0.0.11) for container service name resolution;
    # ipv6 is disabled here because Docker's internal resolver endpoint is IPv4-only.
    resolver 127.0.0.11 ipv6=off valid=30s;

    # 前端路由支持（SPA）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 代理到后端服务
    location /api {
        set $studio_backend http://studio-backend:3000;
        proxy_pass $studio_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # SSE 支持
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # SSE 事件流特殊配置
    location /api/events {
        set $studio_backend http://studio-backend:3000;
        proxy_pass $studio_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Cache-Control 'no-cache';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
