version: '3.8'

services:
  # MinIO 对象存储服务
  minio:
    image: minio/minio:latest
    container_name: game-studio-minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - game-studio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Game Dev Studio 后端服务
  studio-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: game-studio-backend
    ports:
      - "${STUDIO_BACKEND_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - CODEBUDDY_API_KEY=${CODEBUDDY_API_KEY:-}
      - STAR_OFFICE_UI_URL=http://star-office-ui:19000
      - STAR_OFFICE_SYNC_DEBOUNCE_MS=300
      - STAR_OFFICE_HEALTH_CHECK_INTERVAL_MS=10000
      - STAR_OFFICE_JOIN_KEY=${STAR_OFFICE_JOIN_KEY:-ocj_example_team_01}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_USE_SSL=false
      - MINIO_BUCKET=game-files
      - CREATOR_SERVICE_URL=http://creator:8080
    volumes:
      - studio-data:/app/data
      - studio-output:/app/output
    networks:
      - game-studio-network
    depends_on:
      minio:
        condition: service_healthy
      creator:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/agents"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Game Dev Studio 前端服务
  studio-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://studio-backend:3000}
        VITE_STAR_OFFICE_UI_URL: ${VITE_STAR_OFFICE_UI_URL:-http://star-office-ui:19000}
    container_name: game-studio-frontend
    ports:
      - "${STUDIO_FRONTEND_PORT:-5173}:80"
    environment:
      - VITE_API_BASE=http://studio-backend:3000
      - VITE_STAR_OFFICE_UI_URL=http://star-office-ui:19000
    depends_on:
      studio-backend:
        condition: service_healthy
      star-office-ui:
        condition: service_started
    networks:
      - game-studio-network
    restart: unless-stopped

  # Star Office UI 服务
  star-office-ui:
    build:
      context: ./star-office-ui
      dockerfile: Dockerfile
    container_name: star-office-ui
    ports:
      - "${STAR_OFFICE_PORT:-19000}:19000"
    environment:
      - STAR_BACKEND_PORT=19000
      - FLASK_ENV=production
      - STAR_OFFICE_JOIN_KEY=${STAR_OFFICE_JOIN_KEY:-ocj_example_team_01}
      - STAR_OFFICE_MAX_CONCURRENT=${STAR_OFFICE_MAX_CONCURRENT:-100}
      - STAR_OFFICE_SECRET=${STAR_OFFICE_SECRET:-your-secret-key-here-min-24-chars}
      - ASSET_DRAWER_PASS=${ASSET_DRAWER_PASS:-secure-pass-1234}
    volumes:
      - star-office-data:/app/data
    networks:
      - game-studio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Creator 建模微服务（Blender + FastAPI）
  creator:
    build:
      context: ./creator
      dockerfile: Dockerfile
    container_name: game-studio-creator
    ports:
      - "${CREATOR_PORT:-8080}:8080"
    environment:
      - CREATOR_PORT=8080
    volumes:
      - creator-data:/app/data
    networks:
      - game-studio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  studio-data:
    driver: local
  studio-output:
    driver: local
  star-office-data:
    driver: local
  minio-data:
    driver: local
  creator-data:
    driver: local

networks:
  game-studio-network:
    driver: bridge
